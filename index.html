<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIF with Background Audio</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #000;
      margin: 0;
    }
    img {
      max-width: 90%;
      max-height: 80%;
    }
  </style>
</head>
<body>
  <img src="https://image2url.com/r2/default/gifs/1773342276329-64149ca8-9d6c-47aa-a22f-6f6235ea06d5.gif" alt="GIF">

  <audio id="audio" loop>
    <source src="https://image2url.com/r2/default/audio/1773342673458-e121a58c-58df-41d9-800c-e7fa998522a5.mp3" type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById('audio');

    // Attempt to autoplay on page load
    window.addEventListener('load', async () => {
      try {
        audio.muted = true; // mute first to allow autoplay
        await audio.play(); // play muted
        audio.muted = false; // unmute after starting
        console.log("Audio started in the background");
      } catch (err) {
        console.log("Autoplay blocked, audio will play on user interaction");
        // fallback: play on first click
        document.body.addEventListener('click', () => {
          audio.play();
        }, { once: true });
      }
    });
  </script>
</body>
</html>
