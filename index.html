<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIF Display with Audio</title>
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #000;
        flex-direction: column;
        color: #fff;
        font-family: sans-serif;
    }
    img {
        width: 100%;
        height: auto;
    }
    button {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 18px;
        cursor: pointer;
    }
</style>
</head>
<body>
    <img src="https://image2url.com/r2/default/gifs/1773342276329-64149ca8-9d6c-47aa-a22f-6f6235ea06d5.gif" alt="GIF">
    
    <button id="playAudio">Play Audio</button>

    <audio id="audio" loop>
        <source src="https://image2url.com/r2/default/audio/1773342673458-e121a58c-58df-41d9-800c-e7fa998522a5.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script>
        const audio = document.getElementById('audio');
        const btn = document.getElementById('playAudio');

        btn.addEventListener('click', () => {
            audio.play();
            btn.style.display = 'none'; // hide button after playing
        });
    </script>
</body>
</html>
