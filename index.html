<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIF and Audio Player</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #000;
      margin: 0;
      color: white;
      font-family: sans-serif;
    }
    img {
      max-width: 90%;
      max-height: 80%;
      cursor: pointer;
      border: 2px solid white;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>Click the GIF to play audio</h2>

  <!-- GIF Display -->
  <img id="gif" src="https://image2url.com/r2/default/gifs/1773342276329-64149ca8-9d6c-47aa-a22f-6f6235ea06d5.gif" alt="Animated GIF">

  <!-- Audio Player -->
  <audio id="audio" loop>
    <source src="https://image2url.com/r2/default/audio/1773342673458-e121a58c-58df-41d9-800c-e7fa998522a5.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <script>
    const gif = document.getElementById('gif');
    const audio = document.getElementById('audio');

    // Play audio when GIF is clicked
    gif.addEventListener('click', () => {
      audio.play();
    });
  </script>
</body>
</html>
